<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="128"
    height="128"
    viewBox="0 0 128 128">

    <defs>

        <filter
            id="sombra"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%">

            <feDropShadow
                dx="0"
                dy="2"
                stdDeviation="2"
                flood-color="#000000"
                flood-opacity=".18"/>

        </filter>

    </defs>

    <!-- Anillo izquierdo -->

    <g filter="url(#sombra)">

        <circle
            cx="48"
            cy="68"
            r="24"
            fill="none"
            stroke="#6D2E46"
            stroke-width="7"/>

    </g>

    <!-- Anillo derecho -->

    <g filter="url(#sombra)">

        <circle
            cx="80"
            cy="52"
            r="24"
            fill="none"
            stroke="#6D2E46"
            stroke-width="7"/>

    </g>

    <!-- Diamante -->

    <polygon
        points="80,18 86,24 80,30 74,24"
        fill="#6D2E46"/>

    <line
        x1="80"
        y1="30"
        x2="80"
        y2="36"
        stroke="#6D2E46"
        stroke-width="3"/>

</svg>